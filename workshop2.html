<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 style="text-align: center">ข้อมูลผู้เรียน</h1>
    <div style="display: flex; justify-content: center">
      <form
        style="
          display: flex;
          flex-direction: column;
          justify-items: center;
          gap: 10px;
        "
        id="profile-form"
        method="post"
        action="/profiles/create"
      >
        <label for="username">ชื่อผู้ใช้</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="เช่น sara_dev"
          required
        />
        <label for="track">สายการเรียน</label>
        <select id="track" name="track" required>
          <option value="">เลือกสายการเรียน</option>
          <option value="frontend">Frontend</option>
          <option value="backend">Backend</option>
          <option value="fullstack">Fullstack</option>
        </select>
        <label for="about">แนะนำตัว</label>
        <textarea
          id="about"
          name="about"
          placeholder="บอกเป้าหมายการเรียนของคุณ"
          required
        ></textarea>
        <button type="submit">บันทึกโปรไฟล์</button>
      </form>
    </div>
    <nav style="display: flex; justify-content: center; gap: 20px">
      <a href="index.html">ย้อนกลับ</a>
      <a href="workshop3.html">หน้าถัดไป</a>
    </nav>
  </body>
</html>
